# Prefix: C-Space
set -g prefix C-Space
set -g prefix2 C-Space
bind Space send-prefix

# Terminal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',xterm-256color:Tc'

# Splits
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Kill
bind q confirm-before -p "kill pane #P? (y/n)" kill-pane
bind x confirm-before -p "kill window #W? (y/n)" kill-window
bind X confirm-before -p "kill session #S? (y/n)" kill-session

# Reload
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"
bind g display-panes

# Pane navigation (Alt+hjkl)
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-h select-pane -L
bind -n M-l select-pane -R

# Pane resize (Alt+Shift+hjkl)
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-H resize-pane -L 5
bind -n M-L resize-pane -R 5

# Window navigation
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-Left previous-window
bind -n M-Right next-window
bind -n M-s choose-window -Z
bind -n M-z resize-pane -Z

# Vim-style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Last window toggle
bind-key ^space last-window
bind-key p select-layout -o

# Options
set -g focus-events on
set -w -g automatic-rename off
set -g set-titles on
set -g set-titles-string "#S > #T"
set -g mouse on
set -g history-limit 200000
set -g history-file ~/.tmux_history
set -s escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Copy mode — cross-platform clipboard
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
if-shell "uname | grep -q Darwin" {
  bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
  bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
  bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
}
if-shell "uname | grep -q Linux" {
  bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
  bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
  bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
}

# Status bar
set -g status-justify centre
set -g status-style 'bg=#373b41,fg=white,bold,italics'
set -g status-left-length 40
set -g status-left '#[fg=yellow,bold,italics]#S § '
set -g status-right "#[fg=yellow,bold,italics]$USER@#h #[fg=magenta]%l:%M %p"
set -g status-interval 60
set -w -g window-status-current-style bg=red
